<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        
        body {
            background-color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>

<body class="text-slate-800">
    <div class="w-full md:w-[85%] max-w-6xl mx-auto py-10 px-4">

        <header class="mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-[#1a365d] mb-8">Job Application Tracker</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <p class="text-sm font-semibold text-gray-500 mb-1">Total</p>
                    <p id="total" class="text-3xl font-bold text-[#1a365d]">0</p>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <p class="text-sm font-semibold text-gray-500 mb-1">Interview</p>
                    <p id="interviewCount" class="text-3xl font-bold text-emerald-500">0</p>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <p class="text-sm font-semibold text-gray-500 mb-1">Rejected</p>
                    <p id="rejectedCount" class="text-3xl font-bold text-red-500">0</p>
                </div>
            </div>
        </header>
    </div>
    
</body>
</html>
